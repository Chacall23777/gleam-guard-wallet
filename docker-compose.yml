version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: chacal
      POSTGRES_USER: chacal
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chacal123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: always
    env_file: .env
    ports:
      - "3333:3333"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
